<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="life dashboard">
    <meta name="theme-color" content="#6a2b54">
    <title>life dashboard</title>
    
    <link rel="manifest" href="data:application/json,{%22name%22:%22life%20dashboard%22,%22short_name%22:%22dashboard%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23fff%22,%22theme_color%22:%22%236a2b54%22,%22icons%22:[{%22src%22:%22data:image/svg+xml;utf8,%3Csvg%20xmlns=%27http://www.w3.org/2000/svg%27%20viewBox=%270%200%20192%20192%27%3E%3Cdefs%3E%3ClinearGradient%20id=%27g%27%20x1=%270%27%20y1=%270%27%20x2=%271%27%20y2=%271%27%3E%3Cstop%20offset=%270%25%27%20stop-color=%27%23ff4fa3%27/%3E%3Cstop%20offset=%2750%25%27%20stop-color=%27%23a06cff%27/%3E%3Cstop%20offset=%27100%25%27%20stop-color=%27%2327cdbb%27/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect%20width=%27192%27%20height=%27192%27%20rx=%2742%27%20fill=%27url(%23g)%27/%3E%3Ctext%20x=%2750%25%27%20y=%2755%25%27%20text-anchor=%27middle%27%20font-size=%27100%27%20font-family=%27system-ui%27%20font-weight=%27800%27%20fill=%27white%27%3E✨%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22192x192%22,%22type%22:%22image/svg+xml%22,%22purpose%22:%22any%22}]}">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&family=Outfit:wght@300;400;500&display=swap');
        
        :root {
            --ink: #6a2b54;
            --muted: #b07a98;
            --paper: #fff;
            --cl: #ff4fa3;
            --ct: #a06cff;
            --re: #27cdbb;
            --gold: #ffce4d;
            --light-pink: #ffe1f0;
            --light-purple: #e7dcff;
            --light-teal: #d6fff7;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            -webkit-font-smoothing: antialiased;
            -webkit-touch-callout: none;
        }

        body {
            color: var(--ink);
            line-height: 1.5;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at 10% 6%, var(--light-pink) 0, rgba(255, 225, 240, 0) 40%),
                        radial-gradient(circle at 92% 8%, var(--light-purple) 0, rgba(231, 220, 255, 0) 38%),
                        radial-gradient(circle at 50% 100%, var(--light-teal) 0, rgba(214, 255, 247, 0) 45%),
                        linear-gradient(180deg, #fff2f8 0%, #ffeaf4 100%);
            background-attachment: fixed;
            padding-bottom: 80px;
        }

        .wrap {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 18px 70px;
        }

        h1 {
            font-family: 'Jost', sans-serif;
            font-size: clamp(28px, 8vw, 38px);
            font-weight: 600;
            letter-spacing: -0.5px;
            text-transform: lowercase;
            margin: 0 0 8px 0;
            background: linear-gradient(90deg, #ff5fb0, #a06cff 55%, #27cdbb);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 14px rgba(255, 95, 176, 0.18);
        }

        .tagline {
            color: var(--muted);
            text-transform: lowercase;
            font-size: 13px;
            margin: 0 0 20px 0;
            font-weight: 600;
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            border-bottom: 2px solid rgba(255, 225, 240, 0.6);
            padding-bottom: 12px;
        }

        .tab-btn {
            border: none;
            background: transparent;
            color: var(--muted);
            font-family: 'Jost', sans-serif;
            font-size: 13px;
            font-weight: 700;
            text-transform: lowercase;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 16px;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }

        .tab-btn:hover {
            background: rgba(255, 95, 176, 0.1);
            color: var(--ink);
        }

        .tab-btn.active {
            background: linear-gradient(120deg, #ff5fb0, #a06cff);
            color: white;
            box-shadow: 0 4px 12px rgba(160, 108, 255, 0.3);
        }

        .content {
            display: none;
        }

        .content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Calendar */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-header h2 {
            font-family: 'Jost', sans-serif;
            font-size: 24px;
            margin: 0;
            background: linear-gradient(90deg, #ff5fb0, #a06cff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cal-nav {
            display: flex;
            gap: 8px;
        }

        .cal-btn {
            border: 2px solid var(--muted);
            background: white;
            color: var(--ink);
            padding: 8px 14px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 12px;
            text-transform: lowercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cal-btn:active {
            background: linear-gradient(120deg, #ff5fb0, #a06cff);
            border-color: transparent;
            color: white;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }

        .day-cell {
            background: white;
            border: 2px solid #ffe0ee;
            border-radius: 14px;
            padding: 12px;
            min-height: 140px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(255, 95, 176, 0.08);
        }

        .day-cell:active {
            border-color: var(--cl);
            background: rgba(255, 79, 163, 0.05);
            box-shadow: 0 6px 16px rgba(255, 95, 176, 0.14);
        }

        .day-header {
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 8px;
            font-size: 13px;
            text-transform: lowercase;
        }

        .day-events {
            font-size: 11px;
            color: var(--muted);
        }

        .event-item {
            background: rgba(255, 79, 163, 0.15);
            padding: 6px 8px;
            border-radius: 6px;
            margin-bottom: 4px;
            border-left: 2px solid var(--cl);
            word-break: break-word;
        }

        /* To-Do */
        .todo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }

        .todo-card {
            background: white;
            border: 2px solid #ffe0ee;
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(255, 95, 176, 0.08);
        }

        .todo-card h3 {
            font-family: 'Jost', sans-serif;
            font-size: 16px;
            margin: 0 0 14px 0;
            color: var(--ink);
            text-transform: lowercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .add-btn {
            border: none;
            background: linear-gradient(120deg, #ff5fb0, #a06cff);
            color: white;
            padding: 6px 12px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: lowercase;
        }

        .add-btn:active {
            transform: scale(0.98);
        }

        .todo-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px;
            background: rgba(255, 79, 163, 0.08);
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 3px solid var(--cl);
        }

        .todo-item input[type="checkbox"] {
            margin-top: 4px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--cl);
        }

        .todo-item.done {
            opacity: 0.6;
        }

        .todo-item.done label {
            text-decoration: line-through;
        }

        .todo-item label {
            flex: 1;
            cursor: pointer;
            font-size: 13px;
            word-break: break-word;
        }

        /* Section */
        .section {
            margin-bottom: 24px;
        }

        .section-header {
            font-family: 'Jost', sans-serif;
            font-size: 18px;
            font-weight: 700;
            text-transform: lowercase;
            margin: 20px 0 14px 0;
            color: var(--ink);
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .section-header.cl { color: var(--cl); }
        .section-header.ct { color: var(--ct); }
        .section-header.re { color: var(--re); }

        /* Details / Collapsible */
        details {
            background: white;
            border-radius: 12px;
            margin: 8px 0;
            border: 2px solid #ffe0ee;
            border-left: 6px solid #ffb3d6;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(255, 95, 176, 0.08);
        }

        details.cl { border-left-color: var(--cl); }
        details.ct { border-left-color: var(--ct); }
        details.re { border-left-color: var(--re); }

        details[open] {
            box-shadow: 0 6px 16px rgba(160, 108, 255, 0.15);
        }

        summary {
            list-style: none;
            cursor: pointer;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 13px;
            text-transform: lowercase;
            user-select: none;
            -webkit-user-select: none;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary::after {
            content: '▸';
            color: var(--muted);
            margin-left: auto;
            transition: transform 0.3s ease;
        }

        details[open] summary::after {
            transform: rotate(90deg);
        }

        .tag {
            font-size: 10px;
            font-weight: 800;
            text-transform: lowercase;
            padding: 3px 8px;
            border-radius: 12px;
            white-space: nowrap;
        }

        .tag.cl { background: #ffdcee; color: #d61f7f; }
        .tag.ct { background: #eadcff; color: #7a40e0; }
        .tag.re { background: #cdf6f0; color: #119b8b; }

        .pill {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 12px;
            white-space: nowrap;
            text-transform: lowercase;
            background: #f0f0f0;
            color: var(--ink);
        }

        .details-body {
            padding: 14px 16px;
            border-top: 1px solid #ffe0ee;
            background: rgba(255, 225, 240, 0.3);
            font-size: 13px;
        }

        .details-meta {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .meta-item {
            font-size: 11px;
            color: var(--muted);
            text-transform: lowercase;
        }

        .details-body ul {
            margin: 8px 0;
            padding-left: 18px;
        }

        .details-body li {
            margin-bottom: 4px;
            font-size: 12px;
        }

        /* Finance Cards */
        .finance-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            margin-top: 14px;
        }

        .card {
            background: white;
            border: 2px solid #ffe0ee;
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(255, 95, 176, 0.08);
        }

        .card h4 {
            margin: 0 0 12px 0;
            font-size: 14px;
            font-weight: 700;
            text-transform: lowercase;
            color: var(--ink);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Progress Meter */
        .progress-section {
            margin-top: 12px;
        }

        .progress-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--ink);
            text-transform: lowercase;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            height: 8px;
            background: #ffe0ee;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff5fb0, #a06cff);
            transition: width 0.3s ease;
        }

        .amount-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(255, 225, 240, 0.4);
            border-radius: 8px;
            text-transform: lowercase;
        }

        .amount-label {
            color: var(--muted);
        }

        .amount-value {
            color: var(--ink);
            font-weight: 700;
        }

        /* Input */
        input[type="text"],
        input[type="number"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ffe0ee;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            color: var(--ink);
            background: white;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--cl);
            background: rgba(255, 79, 163, 0.05);
            box-shadow: 0 0 0 2px rgba(255, 79, 163, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #ffe0ee;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.04);
            z-index: 100;
        }

        .nav-btn {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
            text-transform: lowercase;
            cursor: pointer;
            padding: 8px;
            transition: all 0.3s ease;
        }

        .nav-btn.active {
            color: var(--cl);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .wrap {
                padding: 20px 14px 70px;
            }

            h1 {
                font-size: 28px;
            }

            .calendar-grid {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            }

            .day-cell {
                min-height: 120px;
                padding: 10px;
            }

            .finance-grid {
                grid-template-columns: 1fr;
            }

            .todo-grid {
                grid-template-columns: 1fr;
            }

            summary {
                font-size: 12px;
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>life dashboard</h1>
        <div class="tagline">summer 2026</div>

        <div class="nav-tabs">
            <button class="tab-btn active" data-tab="home">home</button>
            <button class="tab-btn" data-tab="school">school</button>
            <button class="tab-btn" data-tab="finances">finances</button>
            <button class="tab-btn" data-tab="loan">loan rehab</button>
            <button class="tab-btn" data-tab="apartment">apartment</button>
        </div>

        <!-- HOME -->
        <div id="home" class="content active">
            <div class="calendar-header">
                <h2>📅 next 2 weeks</h2>
                <div class="cal-nav">
                    <button class="cal-btn" onclick="prevWeek()">← prev</button>
                    <button class="cal-btn" onclick="nextWeek()">next →</button>
                </div>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>

            <div class="todo-grid">
                <div class="todo-card">
                    <h3>✨ life to-do <button class="add-btn" onclick="addTodo('life')">+ add</button></h3>
                    <div id="lifeTodos"></div>
                </div>
                <div class="todo-card">
                    <h3>⚡ quick wins <button class="add-btn" onclick="addTodo('wins')">+ add</button></h3>
                    <div id="winsTodos"></div>
                </div>
            </div>
        </div>

        <!-- SCHOOL -->
        <div id="school" class="content">
            <div class="calendar-header">
                <h2>📚 school</h2>
                <div class="cal-nav">
                    <button class="cal-btn" onclick="prevSchoolWeek()">← prev</button>
                    <button class="cal-btn" onclick="nextSchoolWeek()">next →</button>
                </div>
            </div>
            <div id="schoolContent"></div>
        </div>

        <!-- FINANCES -->
        <div id="finances" class="content">
            <h2 style="font-family: 'Jost', sans-serif; font-size: 24px; margin-bottom: 16px; color: var(--ink);">💰 finances</h2>

            <div class="section">
                <div class="section-header">bills</div>
                <div class="finance-grid">
                    <div class="card">
                        <h4>monthly auto-draft <button class="add-btn" onclick="addBill()">+ add</button></h4>
                        <div id="billsList"></div>
                    </div>
                    <div class="card">
                        <h4>current balances</h4>
                        <div id="balancesDisplay"></div>
                        <button class="add-btn" style="width: 100%; margin-top: 10px;" onclick="editBalances()">update</button>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">debt paydown</div>
                <div id="debtMeters"></div>
            </div>

            <div class="section">
                <div class="section-header">savings goals</div>
                <div id="savingsMeters"></div>
            </div>

            <div class="section">
                <div class="section-header">car</div>
                <div id="carExpenses"></div>
                <details style="margin-top: 10px;">
                    <summary>add car expense</summary>
                    <div class="details-body">
                        <input type="text" placeholder="part name" id="carPartName">
                        <input type="number" placeholder="cost" id="carPartCost">
                        <button class="add-btn" style="width: 100%;" onclick="addCarExpense()">add</button>
                    </div>
                </details>
            </div>
        </div>

        <!-- LOAN REHAB -->
        <div id="loan" class="content">
            <h2 style="font-family: 'Jost', sans-serif; font-size: 24px; margin-bottom: 16px; color: var(--ink);">🎯 loan rehab</h2>
            <div class="progress-section">
                <div class="progress-label">
                    <span>overall progress</span>
                    <span id="loanProgress">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="loanProgressBar" style="width: 0%"></div>
                </div>
            </div>
            <div id="loanMilestones"></div>
            <details style="margin-top: 16px;">
                <summary>+ add milestone</summary>
                <div class="details-body">
                    <input type="text" placeholder="milestone name" id="newMilestoneName">
                    <input type="date" id="newMilestoneDate">
                    <textarea placeholder="description" id="newMilestoneDesc"></textarea>
                    <button class="add-btn" style="width: 100%;" onclick="addMilestone()">add</button>
                </div>
            </details>
        </div>

        <!-- APARTMENT -->
        <div id="apartment" class="content">
            <h2 style="font-family: 'Jost', sans-serif; font-size: 24px; margin-bottom: 16px; color: var(--ink);">🏠 apartment (target: sept 1)</h2>
            <div class="progress-section">
                <div class="progress-label">
                    <span>timeline</span>
                    <span id="apartmentProgress">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="apartmentProgressBar" style="width: 0%"></div>
                </div>
            </div>
            <div id="apartmentTasks"></div>
            <details style="margin-top: 16px;">
                <summary>+ add task</summary>
                <div class="details-body">
                    <input type="text" placeholder="task name" id="newApartmentTaskName">
                    <input type="date" id="newApartmentTaskDate">
                    <textarea placeholder="notes" id="newApartmentTaskNotes"></textarea>
                    <button class="add-btn" style="width: 100%;" onclick="addApartmentTask()">add</button>
                </div>
            </details>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" onclick="switchTab('home')">home</button>
        <button class="nav-btn" onclick="switchTab('school')">school</button>
        <button class="nav-btn" onclick="switchTab('finances')">finances</button>
        <button class="nav-btn" onclick="switchTab('loan')">loan</button>
        <button class="nav-btn" onclick="switchTab('apartment')">apt</button>
    </div>

    <script>
        // Data & Storage
        const store = {
            lifeTodos: JSON.parse(localStorage.getItem('lifeTodos')) || [],
            winsTodos: JSON.parse(localStorage.getItem('winsTodos')) || [],
            bills: JSON.parse(localStorage.getItem('bills')) || [
                { name: 'Claude', amount: 100, due: '1st' },
                { name: 'Peacock', amount: 10, due: '6th' },
                { name: 'iCloud', amount: 9.99, due: '8th' },
            ],
            balances: JSON.parse(localStorage.getItem('balances')) || { checking: 0, savings: 0, safe: 0 },
            debts: JSON.parse(localStorage.getItem('debts')) || [],
            savingsGoals: JSON.parse(localStorage.getItem('savingsGoals')) || [],
            carExpenses: JSON.parse(localStorage.getItem('carExpenses')) || [],
            loanMilestones: JSON.parse(localStorage.getItem('loanMilestones')) || [
                { name: 'Step 1: Initial assessment', date: '2026-06-19', desc: 'Gather docs & current status', done: false }
            ],
            apartmentTasks: JSON.parse(localStorage.getItem('apartmentTasks')) || [
                { name: 'Research neighborhoods', date: '2026-07-15', notes: 'Lake County focus', done: false }
            ],
            assignments: []
        };

        let currentCalendarWeek = getStartOfWeek(new Date());
        let currentSchoolWeek = 1;

        function save() {
            localStorage.setItem('lifeTodos', JSON.stringify(store.lifeTodos));
            localStorage.setItem('winsTodos', JSON.stringify(store.winsTodos));
            localStorage.setItem('bills', JSON.stringify(store.bills));
            localStorage.setItem('balances', JSON.stringify(store.balances));
            localStorage.setItem('debts', JSON.stringify(store.debts));

        function getStartOfWeek(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

                const dateStr = date.toISOString().split('T')[0];
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const dayNum = date.getDate();
                
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                cell.innerHTML = `<div class="day-header">${dayName} ${dayNum}</div><div class="day-events"></div>`;
                grid.appendChild(cell);
            }
        }

        function renderSchool() {
            const content = document.getElementById('schoolContent');
            const week1 = currentSchoolWeek;
            const week2 = currentSchoolWeek + 1;

            const renderCourse = (courseKey) => {
                const course = courses[courseKey];
                const assignments = [...(course.weeks[week1] || []), ...(course.weeks[week2] || [])];
                if (assignments.length === 0) {
                    return `<div class="section">
                        <div class="section-header ${course.colorClass}">${course.label}</div>
                        <p style="color: var(--muted); font-size: 13px; padding: 0 4px;">no assignments for weeks ${week1}–${week2}</p>
                    </div>`;
                }
                const items = assignments.map((a, idx) => {
                    const key = `${courseKey}-w${week1}-${idx}`;
                    const done = !!doneAssignments[key];
                    const tc = typeColors[a.type] || typeColors.assignment;
                    const formatted = new Date(a.due + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                    return `
                        <details class="${course.colorClass}" style="margin-bottom: 8px;">
                            <summary>
                                <input type="checkbox" ${done ? 'checked' : ''} onclick="event.stopPropagation(); toggleAssignment('${key}')" style="margin-right: 8px; accent-color: var(--${course.colorClass});">
                                <span style="flex:1; ${done ? 'text-decoration:line-through; opacity:0.55;' : ''}">${a.name}</span>
                                <span class="pill" style="background:${tc.bg}; color:${tc.text}; border: 1px solid ${tc.border};">${a.type}</span>
                            </summary>
                            <div class="details-body">
                                <div class="details-meta">
                                    <span class="meta-item">📅 due ${formatted}</span>
                                    <span class="meta-item">⭐ ${a.points} pts</span>
                                </div>
                            </div>
                        </details>`;
                }).join('');
                const total = assignments.length;
                const done2 = assignments.filter((a, idx) => doneAssignments[`${courseKey}-w${week1}-${idx}`]).length;
                return `<div class="section">
                    <div class="section-header ${course.colorClass}">${course.label} <span class="pill" style="font-size:10px;">${done2}/${total} done</span></div>
                    ${items}
                </div>`;
            };

            content.innerHTML = renderCourse('cl') + renderCourse('ct') + renderCourse('re');

        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));

            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            document.querySelector(`.nav-btn:nth-child(${['home', 'school', 'finances', 'loan', 'apartment'].indexOf(tabName) + 1})`).classList.add('active');
        }

        renderLoanMilestones();

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript;charset=utf-8,' + encodeURIComponent(`
                self.addEventListener('install', event => {
                    event.waitUntil(self.skipWaiting());
                });
                self.addEventListener('activate', event => {
                    event.waitUntil(self.clients.claim());
                });
            `)).catch(() => {});
        }
